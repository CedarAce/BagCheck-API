<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BagCheck Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 260px;
      --bg: #f0f2f5;
      --panel: #fff;
      --border: #e4e8ef;
      --accent: #4a7cf7;
      --text: #1c1c2e;
      --muted: #7a7a9a;
      --high: #1a7f3c; --high-bg: #d1f0de;
      --med:  #7a5500; --med-bg:  #fff0c2;
      --low:  #b91c1c; --low-bg:  #fde8e8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ──────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .topbar-title { font-weight: 700; font-size: 1rem; white-space: nowrap; }
    .topbar-title span { color: var(--accent); }

    .file-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1.5px dashed var(--border);
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--bg);
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap;
    }
    .file-btn:hover { border-color: var(--accent); color: var(--accent); background: #eef2ff; }
    .file-btn.loaded { border-color: #22c55e; color: #15803d; background: #f0fdf4; border-style: solid; }
    .file-btn input { display: none; }

    .topbar-hint { font-size: 0.75rem; color: var(--muted); margin-left: auto; }

    /* ── Layout ───────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-search input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.82rem;
      outline: none;
    }
    .sidebar-search input:focus { border-color: var(--accent); }

    .airline-list {
      overflow-y: auto;
      flex: 1;
    }

    .airline-item {
      padding: 9px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .1s;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .airline-item:hover { background: #f5f7ff; }
    .airline-item.active {
      background: #eef2ff;
      border-left-color: var(--accent);
    }
    .airline-item .al-name { font-size: 0.85rem; font-weight: 600; }
    .airline-item .al-meta { font-size: 0.72rem; color: var(--muted); }
    .airline-item .al-scraped {
      font-size: 0.68rem;
      margin-top: 2px;
    }

    .empty-sidebar {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* ── Detail panel ─────────────────────────────────── */
    .detail {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      text-align: center;
      gap: 10px;
    }
    .placeholder .icon { font-size: 3rem; }
    .placeholder p { font-size: 0.9rem; max-width: 300px; line-height: 1.6; }

    /* airline header */
    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .detail-header h2 { font-size: 1.3rem; font-weight: 700; }
    .detail-header .meta { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }
    .detail-header a {
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    .detail-header a:hover { text-decoration: underline; }

    /* bag sections */
    .bag-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    @media (max-width: 780px) { .bag-grid { grid-template-columns: 1fr; } }

    .bag-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .bag-card h3 {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .bag-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .bag-label { font-size: 0.75rem; color: var(--muted); }
    .bag-val { font-size: 0.82rem; font-weight: 500; font-family: monospace; }
    .bag-val.empty { color: #ccc; font-style: italic; font-family: inherit; font-weight: 400; }

    /* scraper result overlay */
    .scraper-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .scraper-section h3 {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .conf-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .conf-high   { background: var(--high-bg); color: var(--high); }
    .conf-medium { background: var(--med-bg);  color: var(--med);  }
    .conf-low    { background: var(--low-bg);  color: var(--low);  }
    .conf-none   { background: #f0f0f0; color: #999; }

    .scraper-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    @media (max-width: 780px) { .scraper-grid { grid-template-columns: 1fr; } }

    .scraper-cell { background: var(--bg); border-radius: 7px; padding: 10px 12px; }
    .scraper-cell .sc-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
    .scraper-cell .sc-val { font-size: 0.82rem; font-family: monospace; }
    .scraper-cell .sc-val.empty { color: #ccc; font-style: italic; font-family: inherit; }

    .notes-box {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 0.78rem;
      color: #7a5500;
      line-height: 1.5;
    }

    .no-result {
      background: var(--bg);
      border-radius: 7px;
      padding: 14px;
      font-size: 0.83rem;
      color: var(--muted);
      text-align: center;
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

    .fee-row { font-size: 0.78rem; color: var(--muted); margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); }
    .fee-val { color: var(--text); }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="topbar-title">✈ Bag<span>Check</span></span>

  <label class="file-btn" id="airlines-btn">
    <input type="file" id="airlines-file" accept=".csv" />
    📂 <span id="airlines-label">Load airlines.csv</span>
  </label>

  <label class="file-btn" id="results-btn">
    <input type="file" id="results-file" accept=".csv" />
    📊 <span id="results-label">Load results.csv (optional)</span>
  </label>

  <span class="topbar-hint">Select an airline from the sidebar to view its baggage policy</span>
</div>

<!-- Main layout -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="Search airlines…" />
    </div>
    <div class="airline-list" id="airline-list">
      <div class="empty-sidebar">
        Load <strong>airlines.csv</strong> above to see the airline list
      </div>
    </div>
  </div>

  <!-- Detail -->
  <div class="detail" id="detail">
    <div class="placeholder">
      <div class="icon">🧳</div>
      <p>Load <strong>airlines.csv</strong> then click an airline to see its baggage policy details.</p>
    </div>
  </div>

</div>

<script>
  // ── CSV parser ─────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
    const rows = [];
    for (const line of lines) {
      if (!line.trim()) continue;
      const row = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (ch === ',' && !inQ) { row.push(cur); cur = ''; }
        else cur += ch;
      }
      row.push(cur);
      rows.push(row);
    }
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1).map(r =>
      Object.fromEntries(headers.map((h, i) => [h, (r[i] ?? '').trim()]))
    );
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let airlines = [];    // rows from airlines.csv
  let resultsMap = {};  // id → row from results.csv
  let selectedId = null;

  // ── Helpers ────────────────────────────────────────────────────────────────
  function val(v, fallback = '—') {
    return (v && v.trim()) ? v.trim() : fallback;
  }
  function confClass(c) {
    return { high: 'conf-high', medium: 'conf-medium', low: 'conf-low' }[c] || 'conf-none';
  }

  // ── Sidebar ────────────────────────────────────────────────────────────────
  function renderSidebar(filter = '') {
    const list = document.getElementById('airline-list');
    const q = filter.toLowerCase();
    const visible = airlines.filter(a =>
      !q || (a.name||'').toLowerCase().includes(q) || (a.iata||'').toLowerCase().includes(q)
    );

    if (!visible.length) {
      list.innerHTML = '<div class="empty-sidebar">No airlines match your search.</div>';
      return;
    }

    list.innerHTML = '';
    for (const a of visible) {
      const res = resultsMap[a.id];
      const div = document.createElement('div');
      div.className = 'airline-item' + (a.id === selectedId ? ' active' : '');
      div.dataset.id = a.id;

      let scrapedLine = '';
      if (res) {
        const badge = `<span class="conf-badge ${confClass(res.confidence)}">${res.confidence}</span>`;
        scrapedLine = `<span class="al-scraped">${badge} scraped</span>`;
      }

      div.innerHTML = `
        <span class="al-name">${a.name}</span>
        <span class="al-meta">${val(a.iata, '')}${a.iata && a.region ? ' · ' : ''}${val(a.region, '')}</span>
        ${scrapedLine}
      `;
      div.addEventListener('click', () => selectAirline(a.id));
      list.appendChild(div);
    }
  }

  // ── Detail ─────────────────────────────────────────────────────────────────
  function selectAirline(id) {
    selectedId = id;
    renderSidebar(document.getElementById('search-input').value);

    const a = airlines.find(r => r.id === id);
    if (!a) return;
    const res = resultsMap[id] || null;

    const detail = document.getElementById('detail');

    const scrapedAt = res?.last_scraped
      ? (() => { try { return new Date(res.last_scraped).toLocaleString(); } catch { return res.last_scraped; } })()
      : null;

    detail.innerHTML = `
      <div class="detail-header">
        <div>
          <h2>${a.name}${a.iata ? ` <small style="color:var(--muted);font-size:.8rem">(${a.iata})</small>` : ''}</h2>
          <div class="meta">${val(a.region, '')}</div>
          ${a.policy_url ? `<a href="${a.policy_url}" target="_blank" rel="noopener">↗ ${a.policy_url}</a>` : ''}
        </div>
        ${a.last_updated ? `<span style="font-size:.75rem;color:var(--muted)">CSV updated: ${a.last_updated}</span>` : ''}
      </div>

      <p style="font-size:.78rem;color:var(--muted);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Source data (airlines.csv)</p>

      <div class="bag-grid">
        ${bagCard('Personal Item', a, 'pi')}
        ${bagCard('Carry-on', a, 'co')}
        ${bagCard('Checked Bag', a, 'cb')}
      </div>

      <hr class="divider" />

      <p style="font-size:.78rem;color:var(--muted);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Scraper output (results.csv)</p>

      ${res ? scraperSection(res, scrapedAt) : noResult()}
    `;
  }

  function bagCard(title, a, prefix) {
    const dim_cm = val(a[`${prefix}_dimensions_cm`]);
    const dim_in = val(a[`${prefix}_dimensions_in`]);
    const kg     = val(a[`${prefix}_weight_kg`]);
    const lbs    = val(a[`${prefix}_weight_lbs`]);
    const fee    = val(a[`${prefix}_fee${prefix==='cb'?'_usd':''}`]);
    const notes  = val(a[`${prefix}_notes`]);

    function row(label, v) {
      const isEmpty = v === '—';
      return `<div class="bag-row">
        <span class="bag-label">${label}</span>
        <span class="bag-val${isEmpty?' empty':''}">${v}</span>
      </div>`;
    }

    return `<div class="bag-card">
      <h3>${title}</h3>
      ${row('Dimensions (cm)', dim_cm)}
      ${row('Dimensions (in)', dim_in)}
      ${row('Weight (kg)', kg)}
      ${row('Weight (lbs)', lbs)}
      ${fee !== '—' ? `<div class="fee-row">Fee: <span class="fee-val">${fee}</span></div>` : ''}
      ${notes !== '—' ? `<div class="fee-row" style="color:var(--muted)"><em>${notes}</em></div>` : ''}
    </div>`;
  }

  function scraperSection(res, scrapedAt) {
    function cell(label, v) {
      const empty = !v || !v.trim();
      return `<div class="scraper-cell">
        <div class="sc-label">${label}</div>
        <div class="sc-val${empty?' empty':''}">${empty ? '—' : v}</div>
      </div>`;
    }
    return `<div class="scraper-section">
      <h3>
        Extracted result
        <span class="conf-badge ${confClass(res.confidence)}">${res.confidence || '?'} confidence</span>
        ${scrapedAt ? `<span style="font-size:.72rem;color:var(--muted);font-weight:400">scraped ${scrapedAt}</span>` : ''}
      </h3>
      <div class="scraper-grid">
        ${cell('Personal Item (cm)', res.pi_dimensions_cm)}
        ${cell('Carry-on (cm)', res.co_dimensions_cm)}
        ${cell('Checked Bag (cm)', res.cb_dimensions_cm)}
        ${cell('PI weight (kg)', res.pi_weight_kg)}
        ${cell('CO weight (kg)', res.co_weight_kg)}
        ${cell('CB weight (kg)', res.cb_weight_kg)}
      </div>
      ${res.notes ? `<div class="notes-box">⚠ ${res.notes}</div>` : ''}
    </div>`;
  }

  function noResult() {
    const loaded = Object.keys(resultsMap).length > 0;
    return `<div class="no-result">
      ${loaded
        ? 'No scraper result found for this airline in results.csv.'
        : 'Load <strong>results.csv</strong> above to see the scraper\'s extracted output here.'}
    </div>`;
  }

  // ── File loading ───────────────────────────────────────────────────────────
  function loadFile(input, onRows) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => onRows(parseCSV(e.target.result), file.name);
    reader.readAsText(file);
  }

  document.getElementById('airlines-file').addEventListener('change', function () {
    loadFile(this, (rows, name) => {
      airlines = rows;
      document.getElementById('airlines-label').textContent = `${name} (${rows.length})`;
      document.getElementById('airlines-btn').classList.add('loaded');
      selectedId = null;
      document.getElementById('detail').innerHTML = `<div class="placeholder"><div class="icon">👈</div><p>Select an airline from the sidebar.</p></div>`;
      renderSidebar();
    });
  });

  document.getElementById('results-file').addEventListener('change', function () {
    loadFile(this, (rows, name) => {
      resultsMap = Object.fromEntries(rows.map(r => [r.id, r]));
      document.getElementById('results-label').textContent = `${name} (${rows.length})`;
      document.getElementById('results-btn').classList.add('loaded');
      renderSidebar(document.getElementById('search-input').value);
      if (selectedId) selectAirline(selectedId); // refresh detail
    });
  });

  document.getElementById('search-input').addEventListener('input', function () {
    renderSidebar(this.value);
  });
</script>
</body>
</html>
