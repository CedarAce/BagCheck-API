<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BagCheck Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 260px;
      --bg: #f0f2f5;
      --panel: #fff;
      --border: #e4e8ef;
      --accent: #4a7cf7;
      --text: #1c1c2e;
      --muted: #7a7a9a;
      --high: #1a7f3c; --high-bg: #d1f0de;
      --med:  #7a5500; --med-bg:  #fff0c2;
      --low:  #b91c1c; --low-bg:  #fde8e8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ──────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-title { font-weight: 700; font-size: 1rem; white-space: nowrap; }
    .topbar-title span { color: var(--accent); }
    .topbar-hint { font-size: 0.78rem; color: var(--muted); margin-left: auto; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ccc; flex-shrink: 0;
    }
    .status-dot.ok   { background: #22c55e; }
    .status-dot.warn { background: #f59e0b; }

    /* ── Layout ───────────────────────────────────────── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ──────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-search { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .sidebar-search input {
      width: 100%; padding: 6px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 0.82rem; outline: none;
    }
    .sidebar-search input:focus { border-color: var(--accent); }

    .airline-list { overflow-y: auto; flex: 1; }
    .airline-item {
      padding: 9px 14px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .1s;
      display: flex; flex-direction: column; gap: 1px;
    }
    .airline-item:hover  { background: #f5f7ff; }
    .airline-item.active { background: #eef2ff; border-left-color: var(--accent); }
    .airline-item .al-name { font-size: 0.85rem; font-weight: 600; }
    .airline-item .al-meta { font-size: 0.72rem; color: var(--muted); }
    .airline-item .al-scraped { font-size: 0.68rem; margin-top: 2px; }

    .empty-sidebar { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 0.85rem; line-height: 1.6; }

    /* ── Detail panel ─────────────────────────────────── */
    .detail { flex: 1; overflow-y: auto; padding: 20px 24px; }

    .placeholder {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; color: var(--muted); text-align: center; gap: 10px;
    }
    .placeholder .icon { font-size: 3rem; }
    .placeholder p { font-size: 0.9rem; max-width: 300px; line-height: 1.6; }

    .detail-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 20px;
      flex-wrap: wrap; gap: 10px;
    }
    .detail-header h2 { font-size: 1.3rem; font-weight: 700; }
    .detail-header .meta { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }
    .detail-header a { font-size: 0.78rem; color: var(--accent); text-decoration: none; word-break: break-all; }
    .detail-header a:hover { text-decoration: underline; }

    /* Run button */
    .run-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 18px; border-radius: 8px;
      background: var(--accent); color: #fff;
      border: none; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: background .15s, opacity .15s;
    }
    .run-btn:hover:not(:disabled) { background: #3a6ce0; }
    .run-btn:disabled { opacity: .55; cursor: not-allowed; }
    .run-btn.running { background: #f59e0b; }

    /* Bag cards */
    .bag-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
    .bag-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .bag-card h3 { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 10px; }
    .bag-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .bag-label { font-size: 0.75rem; color: var(--muted); }
    .bag-val { font-size: 0.82rem; font-weight: 500; font-family: monospace; }
    .bag-val.empty { color: #ccc; font-style: italic; font-family: inherit; font-weight: 400; }
    .fee-row { font-size: 0.78rem; color: var(--muted); margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); }

    /* Confidence badges */
    .conf-badge { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 0.72rem; font-weight: 700; }
    .conf-high   { background: var(--high-bg); color: var(--high); }
    .conf-medium { background: var(--med-bg);  color: var(--med);  }
    .conf-low    { background: var(--low-bg);  color: var(--low);  }
    .conf-none   { background: #f0f0f0; color: #999; }

    /* Scraper output */
    .scraper-section { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .scraper-section h3 { font-size: 0.85rem; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .scraper-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
    .scraper-cell { background: var(--bg); border-radius: 7px; padding: 10px 12px; }
    .scraper-cell .sc-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
    .scraper-cell .sc-val { font-size: 0.82rem; font-family: monospace; }
    .scraper-cell .sc-val.empty { color: #ccc; font-style: italic; font-family: inherit; }
    .notes-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 7px; padding: 8px 12px; font-size: 0.78rem; color: #7a5500; line-height: 1.5; }
    .no-result { background: var(--bg); border-radius: 7px; padding: 14px; font-size: 0.83rem; color: var(--muted); text-align: center; }

    /* Log terminal */
    .log-box {
      background: #0f172a; color: #94a3b8;
      border-radius: 8px; padding: 12px 14px;
      font-family: monospace; font-size: 0.78rem;
      line-height: 1.6; max-height: 200px;
      overflow-y: auto; margin-top: 12px;
      white-space: pre-wrap; word-break: break-all;
    }
    .log-box .log-ok   { color: #4ade80; }
    .log-box .log-err  { color: #f87171; }
    .log-box .log-info { color: #94a3b8; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">✈ Bag<span>Check</span></span>
  <span id="airlines-status" style="display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)">
    <span class="status-dot" id="airlines-dot"></span>
    <span id="airlines-lbl">loading airlines…</span>
  </span>
  <span id="results-status" style="display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)">
    <span class="status-dot" id="results-dot"></span>
    <span id="results-lbl">no results yet</span>
  </span>
  <span class="topbar-hint">Select an airline → click Run to scrape it</span>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="Search airlines…" />
    </div>
    <div class="airline-list" id="airline-list">
      <div class="empty-sidebar">Loading…</div>
    </div>
  </div>

  <div class="detail" id="detail">
    <div class="placeholder">
      <div class="icon">🧳</div>
      <p>Select an airline from the sidebar to view its policy and run the scraper.</p>
    </div>
  </div>
</div>

<script>
  // ── CSV parser ─────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
    const rows = [];
    for (const line of lines) {
      if (!line.trim()) continue;
      const row = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (ch === ',' && !inQ) { row.push(cur); cur = ''; }
        else cur += ch;
      }
      row.push(cur);
      rows.push(row);
    }
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1).map(r => Object.fromEntries(headers.map((h,i) => [h,(r[i]??'').trim()])));
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let airlines = [];
  let resultsMap = {};
  let selectedId = null;
  let running = false;

  // ── Fetch CSVs from server ─────────────────────────────────────────────────
  async function fetchCSV(path) {
    const res = await fetch(path);
    if (!res.ok) return null;
    return parseCSV(await res.text());
  }

  async function reloadResults() {
    const rows = await fetchCSV('/results.csv');
    if (rows && rows.length) {
      resultsMap = Object.fromEntries(rows.map(r => [r.id, r]));
      document.getElementById('results-dot').className = 'status-dot ok';
      document.getElementById('results-lbl').textContent = `results.csv (${rows.length})`;
    } else {
      resultsMap = {};
      document.getElementById('results-dot').className = 'status-dot warn';
      document.getElementById('results-lbl').textContent = 'no results yet';
    }
  }

  async function init() {
    const rows = await fetchCSV('/airlines.csv');
    if (rows && rows.length) {
      airlines = rows;
      document.getElementById('airlines-dot').className = 'status-dot ok';
      document.getElementById('airlines-lbl').textContent = `airlines.csv (${rows.length})`;
      await reloadResults();
      renderSidebar();
    } else {
      document.getElementById('airlines-dot').className = 'status-dot warn';
      document.getElementById('airlines-lbl').textContent = 'airlines.csv not found — run server.py';
      document.getElementById('airline-list').innerHTML =
        '<div class="empty-sidebar">Start <strong>server.py</strong> and reload this page.</div>';
    }
  }

  // ── Sidebar ────────────────────────────────────────────────────────────────
  function confClass(c) {
    return {high:'conf-high',medium:'conf-medium',low:'conf-low'}[c] || 'conf-none';
  }

  function renderSidebar(filter = '') {
    const list = document.getElementById('airline-list');
    const q = filter.toLowerCase();
    const visible = airlines.filter(a =>
      !q || (a.name||'').toLowerCase().includes(q) || (a.iata||'').toLowerCase().includes(q)
    );
    if (!visible.length) {
      list.innerHTML = '<div class="empty-sidebar">No airlines match.</div>';
      return;
    }
    list.innerHTML = '';
    for (const a of visible) {
      const res = resultsMap[a.id];
      const div = document.createElement('div');
      div.className = 'airline-item' + (a.id === selectedId ? ' active' : '');
      div.dataset.id = a.id;
      const badge = res
        ? `<span class="al-scraped"><span class="conf-badge ${confClass(res.confidence)}">${res.confidence}</span> scraped</span>`
        : '';
      div.innerHTML = `
        <span class="al-name">${a.name}</span>
        <span class="al-meta">${a.iata||''}${a.iata&&a.region?' · ':''}${a.region||''}</span>
        ${badge}`;
      div.addEventListener('click', () => selectAirline(a.id));
      list.appendChild(div);
    }
  }

  // ── Detail ─────────────────────────────────────────────────────────────────
  function val(v) { return (v && v.trim()) ? v.trim() : null; }

  function bagCard(title, a, prefix) {
    const feeKey = prefix === 'cb' ? 'cb_fee_usd' : `${prefix}_fee`;
    const fields = [
      ['Dimensions (cm)', a[`${prefix}_dimensions_cm`]],
      ['Dimensions (in)', a[`${prefix}_dimensions_in`]],
      ['Weight (kg)',     a[`${prefix}_weight_kg`]],
      ['Weight (lbs)',    a[`${prefix}_weight_lbs`]],
    ];
    const fee   = val(a[feeKey]);
    const notes = val(a[`${prefix}_notes`]);
    return `<div class="bag-card">
      <h3>${title}</h3>
      ${fields.map(([l,v]) => {
        const empty = !val(v);
        return `<div class="bag-row">
          <span class="bag-label">${l}</span>
          <span class="bag-val${empty?' empty':''}">${val(v)||'—'}</span>
        </div>`;
      }).join('')}
      ${fee   ? `<div class="fee-row">Fee: <strong>${fee}</strong></div>` : ''}
      ${notes ? `<div class="fee-row"><em>${notes}</em></div>` : ''}
    </div>`;
  }

  function scraperResult(res) {
    let scrapedAt = '';
    if (res.last_scraped) {
      try { scrapedAt = new Date(res.last_scraped).toLocaleString(); } catch {}
    }
    function cell(label, v) {
      const empty = !val(v);
      return `<div class="scraper-cell">
        <div class="sc-label">${label}</div>
        <div class="sc-val${empty?' empty':''}">${val(v)||'—'}</div>
      </div>`;
    }
    return `<div class="scraper-section" id="scraper-result">
      <h3>
        Scraper result
        <span class="conf-badge ${confClass(res.confidence)}">${res.confidence||'?'} confidence</span>
        ${scrapedAt ? `<span style="font-size:.72rem;color:var(--muted);font-weight:400">scraped ${scrapedAt}</span>` : ''}
      </h3>
      <div class="scraper-grid">
        ${cell('Personal Item (cm)', res.pi_dimensions_cm)}
        ${cell('Carry-on (cm)',      res.co_dimensions_cm)}
        ${cell('Checked Bag (cm)',   res.cb_dimensions_cm)}
        ${cell('PI weight (kg)',     res.pi_weight_kg)}
        ${cell('CO weight (kg)',     res.co_weight_kg)}
        ${cell('CB weight (kg)',     res.cb_weight_kg)}
      </div>
      ${res.notes ? `<div class="notes-box">⚠ ${res.notes}</div>` : ''}
    </div>`;
  }

  function selectAirline(id) {
    selectedId = id;
    renderSidebar(document.getElementById('search-input').value);
    const a = airlines.find(r => r.id === id);
    if (!a) return;

    const res = resultsMap[id] || null;
    const detail = document.getElementById('detail');

    detail.innerHTML = `
      <div class="detail-header">
        <div>
          <h2>${a.name}${a.iata ? ` <small style="color:var(--muted);font-size:.8rem">(${a.iata})</small>` : ''}</h2>
          <div class="meta">${a.region||''}</div>
          ${a.policy_url ? `<a href="${a.policy_url}" target="_blank" rel="noopener">↗ ${a.policy_url}</a>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <button class="run-btn" id="run-btn" onclick="runScraper('${id}')">
            ▶ Run Scraper
          </button>
          <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted);cursor:pointer;user-select:none">
            <input type="checkbox" id="headed-toggle" style="cursor:pointer" />
            👁 Show browser
          </label>
        </div>
      </div>

      <p style="font-size:.78rem;color:var(--muted);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Source data (airlines.csv)</p>
      <div class="bag-grid">
        ${bagCard('Personal Item', a, 'pi')}
        ${bagCard('Carry-on', a, 'co')}
        ${bagCard('Checked Bag', a, 'cb')}
      </div>

      <hr class="divider" />

      <p style="font-size:.78rem;color:var(--muted);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Scraper output</p>
      <div id="scraper-area">
        ${res ? scraperResult(res) : `<div class="no-result">No result yet — click <strong>Run Scraper</strong> above.</div>`}
      </div>
    `;
  }

  // ── Run scraper via SSE ────────────────────────────────────────────────────
  function runScraper(id) {
    if (running) return;
    running = true;

    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.classList.add('running');
    btn.innerHTML = `<span class="spinner"></span> Running…`;

    const area = document.getElementById('scraper-area');
    area.innerHTML = `<div class="no-result">Scraping — please wait…</div><div class="log-box" id="log-box"></div>`;
    const logBox = document.getElementById('log-box');

    const headed = document.getElementById('headed-toggle')?.checked;
    const es = new EventSource(`/run/${encodeURIComponent(id)}${headed ? '?headed=1' : ''}`);

    es.onmessage = async (e) => {
      const line = e.data;

      if (line === '__DONE__') {
        es.close();
        running = false;
        // Reload results.csv and re-render
        await reloadResults();
        renderSidebar(document.getElementById('search-input').value);
        const res = resultsMap[id];
        const resultHtml = res ? scraperResult(res) : `<div class="no-result">Scrape finished but no result found in results.csv.</div>`;
        area.innerHTML = resultHtml + `<div class="log-box" id="log-box-done">${logBox.innerHTML}<span class="log-ok">✓ Done</span></div>`;
        btn.disabled = false;
        btn.classList.remove('running');
        btn.innerHTML = '▶ Run Again';
        return;
      }

      if (line.startsWith('__ERROR__')) {
        es.close();
        running = false;
        const msg = line.replace('__ERROR__ ', '');
        logBox.innerHTML += `<span class="log-err">✗ ${msg}</span>\n`;
        logBox.scrollTop = logBox.scrollHeight;
        area.innerHTML = `<div class="no-result" style="color:var(--low)">Scrape failed: ${msg}</div>` + area.innerHTML;
        btn.disabled = false;
        btn.classList.remove('running');
        btn.innerHTML = '▶ Retry';
        return;
      }

      logBox.innerHTML += `<span class="log-info">${line}</span>\n`;
      logBox.scrollTop = logBox.scrollHeight;
    };

    es.onerror = () => {
      es.close();
      running = false;
      logBox.innerHTML += `<span class="log-err">Connection lost.</span>\n`;
      btn.disabled = false;
      btn.classList.remove('running');
      btn.innerHTML = '▶ Retry';
    };
  }

  // ── Search ─────────────────────────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', function () {
    renderSidebar(this.value);
  });

  // ── Boot ───────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
